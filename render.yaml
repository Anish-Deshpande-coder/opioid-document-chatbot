services:
  - type: web
    name: opioid-chatbot-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn chatbot_server:app
    disk:
      name: chroma-storage
      mountPath: /opt/render/project/src/chroma_db_pdfs
      sizeGB: 1
    envVars:
      - key: PORTKEY_API_KEY
        sync: false
